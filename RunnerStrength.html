<title>Runner Strength</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--bg:#0a0a08;--card:#151510;--card2:#1a1a14;--line:rgba(255,255,255,0.07);--muted:#8f8f84;--fg:#f3f0e8;--fg2:#cfc9c0;--lime:#c9f24a;--green:#4ade80;--amber:#f59e0b;--orange:#f97316;--red:#ef4444;--blue:#60a5fa;--sky:#38bdf8}
html,body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,system-ui,sans-serif;line-height:1.45;overscroll-behavior-y:contain;-webkit-font-smoothing:antialiased}
body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}
#app{max-width:480px;margin:0 auto;padding:16px 16px 48px;position:relative;z-index:1}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:99px}

.glow{position:fixed;top:0;left:50%;transform:translateX(-50%);width:120%;height:50vh;background:radial-gradient(ellipse at 50% 0%,rgba(201,242,74,.035) 0%,transparent 60%);pointer-events:none;z-index:0}

/* Logo */
.logo{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:rgba(201,242,74,.13);display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(201,242,74,.12)}
.logo h1{font-size:20px;font-weight:800;letter-spacing:-.02em}
.logo h1 b{color:var(--lime)}
.logo small{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);display:block;margin-top:1px}

/* Program Tabs */
.ptabs{display:flex;gap:8px;margin-bottom:6px}
.ptab{flex:1;padding:12px 8px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.025);color:var(--muted);font-size:13.5px;font-weight:600;cursor:pointer;text-align:center;transition:all .2s}
.ptab:active{transform:scale(.97)}
.ptab.on{background:linear-gradient(135deg,rgba(201,242,74,.14),rgba(201,242,74,.04));color:var(--lime);border-color:rgba(201,242,74,.25);box-shadow:0 0 20px rgba(201,242,74,.07)}
.ptab small{font-size:10px;font-weight:400;opacity:.7;display:block;margin-top:2px}

.lead{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:22px}

/* Phase */
.phase{margin-bottom:24px}
.phase-hdr{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.phase-icon{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px}
.phase-hdr h2{font-size:14.5px;font-weight:700;color:var(--fg)}
.phase-pill{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:2px 8px;border-radius:99px}
.phase-desc{font-size:11.5px;color:var(--muted);line-height:1.5;margin:4px 0 10px 32px}

/* Week Card */
.wk-card{width:100%;text-align:left;border-radius:16px;padding:14px 14px 12px;cursor:pointer;border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.028) 0%,rgba(21,21,16,.5) 100%);transition:all .15s;margin-bottom:8px;display:block}
.wk-card:active{transform:scale(.985);background:rgba(255,255,255,.05)}
.wk-card.done{border-color:rgba(74,222,128,.2);background:linear-gradient(135deg,rgba(74,222,128,.07),rgba(21,21,16,.85))}
.wk-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.wk-left{display:flex;align-items:center;gap:10px}
.wk-num{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800}
.wk-info{font-size:13.5px;font-weight:600;color:var(--fg)}
.wk-sub{font-size:10.5px;color:var(--muted);margin-top:2px}
.wk-right{display:flex;align-items:center;gap:6px}
.wk-label{font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:99px}
.wk-check{color:var(--green);font-size:14px}
.wk-bar{height:3px;border-radius:99px;background:rgba(255,255,255,.04);overflow:hidden}
.wk-bar-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* Back */
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.back-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--fg2);font-size:18px;transition:all .15s}
.back-btn:active{transform:scale(.9)}
.back-label{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;flex:1}

/* Week Nav */
.wk-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 0 6px;gap:8px}
.wk-nav-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:9px 0;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--fg2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.wk-nav-btn:active{transform:scale(.97);background:rgba(255,255,255,.06)}
.wk-nav-btn:disabled{opacity:.25;pointer-events:none}
.wk-nav-btn .arr{font-size:15px;opacity:.6}
.wk-nav-mid{font-size:11px;color:var(--muted);text-align:center;min-width:60px}

/* Week Header */
.wk-hdr{display:flex;align-items:flex-end;gap:10px;margin:8px 0 14px}
.wk-hdr-big{font-size:40px;font-weight:800;line-height:1;letter-spacing:-.02em}
.wk-hdr-sub{font-size:16px;font-weight:700;color:var(--fg);padding-bottom:4px}
.prog-bar{display:flex;align-items:center;gap:8px;margin-top:4px}
.prog-track{flex:1;height:5px;border-radius:99px;background:rgba(255,255,255,.05);overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .4s ease}
.prog-text{font-size:10.5px;font-variant-numeric:tabular-nums;min-width:32px;text-align:right}

/* Day Tabs */
.daytabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.daytabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:7px 14px;border-radius:10px;border:1px solid transparent;background:rgba(255,255,255,.035);color:var(--muted);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.dtab:active{transform:scale(.95)}
.dtab.on{background:rgba(201,242,74,.11);color:var(--lime);border-color:rgba(201,242,74,.2)}

/* Block */
.blk{border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:10px}
.blk-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(255,255,255,.025);cursor:pointer}
.blk-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.blk-title{flex:1;font-size:13.5px;font-weight:600;color:var(--fg)}
.blk-count{font-size:10.5px;color:var(--muted)}
.blk-count span{color:var(--green);opacity:.8}
.blk-chev{color:var(--muted);font-size:14px;transition:transform .15s;flex-shrink:0}
.blk.open .blk-chev{transform:rotate(90deg)}
.blk-note{padding:10px 14px;font-size:11px;color:var(--muted);line-height:1.45;border-top:1px solid var(--line);background:rgba(201,242,74,.03)}
.blk-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.blk.open .blk-body{max-height:5000px}

/* Exercise */
.ex{padding:10px 14px;border-top:1px solid var(--line)}
.ex-row{display:flex;gap:10px;align-items:flex-start}
.ex-chk{width:20px;height:20px;border-radius:6px;border:1.5px solid rgba(255,255,255,.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;transition:all .15s}
.ex-chk.on{border-color:var(--green);background:rgba(74,222,128,.15)}
.ex-chk.on::after{content:"✓";color:var(--green);font-size:11px;font-weight:700}
.ex.done .ex-name{text-decoration:line-through;color:var(--muted)}
.ex-body{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:600;color:var(--fg);line-height:1.3}
.ex-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.ex-chip{font-size:10px;font-variant-numeric:tabular-nums;padding:2px 7px;border-radius:6px;font-weight:500}
.chip-rpe{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.12)}
.chip-load{background:rgba(255,255,255,.04);color:var(--muted)}
.chip-sets{background:rgba(201,242,74,.07);color:var(--lime)}
.sets-grid{margin-top:8px;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.sets-hdr,.sets-vals{display:grid}
.sets-cell{padding:5px;text-align:center;font-variant-numeric:tabular-nums}
.sets-hdr .sets-cell{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);font-weight:500}
.sets-vals .sets-cell{font-size:13px;color:var(--fg2);font-weight:500}
.sets-cell+.sets-cell{border-left:1px solid var(--line)}
.ex-note{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4}

.foot{text-align:center;font-size:10px;color:rgba(143,143,132,.5);margin-top:32px;line-height:1.5}
</style>
</head>

const D=JSON.parse(DATA);
const DO={Sunday:0,Monday:1,Tuesday:2,Wednesday:3,Thursday:4,Friday:5,Saturday:6};
let S={prog:'base',week:null,day:null};

const PC={Foundation:'#4ade80',Build:'#c9f24a',Strength:'#f59e0b',Peak:'#f97316','Race Week':'#ef4444',Recovery:'#60a5fa'};
const PI={Foundation:'🛡️',Build:'📈',Strength:'💪',Peak:'🔥','Race Week':'🎯',Recovery:'💤'};
const BI=n=>{const u=n.toUpperCase();if(u.includes('WARM')||u.includes('MOBILITY'))return'🔥';if(u.includes('PLYO'))return'⚡';if(u.includes('MAIN')||u.includes('STRENGTH'))return'🏋️';if(u.includes('CORE'))return'🛡️';return'💪'};

function loadDone(){try{return JSON.parse(localStorage.getItem('rs-done')||'{}')}catch{return{}}}
function saveDone(d){try{localStorage.setItem('rs-done',JSON.stringify(d))}catch{}}
let done=loadDone();
function exKey(wi,d,n){return S.prog+'-w'+wi+'-'+d+'-'+n}

const $=id=>document.getElementById(id);
const app=$('app');

function weekLabel(w){if(w.is_recovery)return'Recovery';if(w.weeks_before_race===0)return'Race week';if(w.weeks_before_race>0)return w.weeks_before_race+'w out';return''}

function render(){
  if(S.week==null)renderHome();else renderWeek();
}

function renderHome(){
  const p=D.programs[S.prog];
  let h='<div class="logo"><div class="logo-icon">🏋️</div><div><h1>RUNNER <b>STRENGTH</b></h1><small>Training Programs</small></div></div>';
  h+='<div class="ptabs">';
  for(const k of['base','race']){const pr=D.programs[k];h+='<button class="ptab'+(S.prog===k?' on':'')+'" onclick="S.prog=''+k+'';S.week=null;render()">'+pr.name+'<small>'+pr.total_weeks+' weeks</small></button>'}
  h+='</div>';
  h+='<p class="lead">'+esc(p.description)+'</p>';

  for(const ph of p.phases){
    const wks=p.weeks.filter(w=>w.week_index>=ph.week_range[0]&&(ph.week_range[1]>=99?true:w.week_index<=ph.week_range[1]));
    if(!wks.length)continue;
    const c=PC[ph.name]||'#c9f24a';
    h+='<div class="phase"><div class="phase-hdr"><div class="phase-icon" style="background:'+c+'18;color:'+c+'">'+(PI[ph.name]||'💪')+'</div><h2>'+esc(ph.name)+'</h2><span class="phase-pill" style="background:'+c+'12;color:'+c+'aa;border:1px solid '+c+'20">W'+ph.week_range[0]+(ph.week_range[1]>ph.week_range[0]&&ph.week_range[1]<99?'–W'+ph.week_range[1]:'')+'</span></div>';
    h+='<p class="phase-desc">'+esc(ph.description)+'</p>';

    for(const w of wks){
      const days=[...w.sessions].sort((a,b)=>DO[a.day]-DO[b.day]);
      const totalEx=days.reduce((a,s)=>a+s.blocks.reduce((a2,b)=>a2+b.exercises.length,0),0);
      const doneEx=days.reduce((a,s)=>a+s.blocks.reduce((a2,b)=>a2+b.exercises.filter(e=>done[exKey(w.week_index,s.day,e.name)]).length,0),0);
      const pct=totalEx?Math.round(doneEx/totalEx*100):0;
      const isDone=pct===100&&totalEx>0;
      const lbl=weekLabel(w);
      h+='<button class="wk-card'+(isDone?' done':'')+'" onclick="openWeek('+w.week_index+')">';
      h+='<div class="wk-top"><div class="wk-left"><div class="wk-num" style="background:'+c+'18;color:'+c+';border:1px solid '+c+'25">'+String(w.week_index).padStart(2,'0')+'</div><div><div class="wk-info">Week '+w.week_index+'</div><div class="wk-sub">'+days.map(s=>{const n=s.blocks.reduce((a,b)=>a+b.exercises.length,0);return s.day.slice(0,3)+(s.optional?'*':'')+' ('+n+')'}).join(' · ')+'</div></div></div><div class="wk-right">';
      if(lbl)h+='<span class="wk-label" style="background:'+c+'12;color:'+c+';border:1px solid '+c+'20">'+lbl+'</span>';
      if(isDone)h+='<span class="wk-check">✓</span>';
      h+='</div></div>';
      if(totalEx){h+='<div class="wk-bar"><div class="wk-bar-fill" style="width:'+pct+'%;background:'+(isDone?'linear-gradient(90deg,#4ade80,#22c55e)':'linear-gradient(90deg,'+c+'90,'+c+'60)')+'"></div></div>'}
      h+='</button>';
    }
    h+='</div>';
  }
  h+='<div class="foot">Offline-capable · '+D.programs.base.total_weeks+'+'+D.programs.race.total_weeks+' weeks</div>';
  app.innerHTML=h;window.scrollTo(0,0);
}

function openWeek(wi){
  S.week=wi;
  const p=D.programs[S.prog];
  const w=p.weeks.find(x=>x.week_index===wi);
  const days=[...w.sessions].sort((a,b)=>DO[a.day]-DO[b.day]);
  S.day=days[0].day;
  renderWeek();
}

function goWeek(wi){
  const p=D.programs[S.prog];
  const w=p.weeks.find(x=>x.week_index===wi);
  if(!w)return;
  const days=[...w.sessions].sort((a,b)=>DO[a.day]-DO[b.day]);
  const hasDay=days.some(d=>d.day===S.day);
  if(!hasDay)S.day=days[0].day;
  S.week=wi;
  renderWeek();
}

function renderWeek(){
  const p=D.programs[S.prog];
  const w=p.weeks.find(x=>x.week_index===S.week);
  const allWeeks=p.weeks;
  const wIdx=allWeeks.findIndex(x=>x.week_index===S.week);
  const prevW=wIdx>0?allWeeks[wIdx-1]:null;
  const nextW=wIdx<allWeeks.length-1?allWeeks[wIdx+1]:null;
  const days=[...w.sessions].sort((a,b)=>DO[a.day]-DO[b.day]);
  const s=days.find(x=>x.day===S.day)||days[0];
  const lbl=weekLabel(w);
  const c=PC[w.phase_name]||'#c9f24a';

  // progress
  const totalEx=s.blocks.reduce((a,b)=>a+b.exercises.length,0);
  const doneEx=s.blocks.reduce((a,b)=>a+b.exercises.filter(e=>done[exKey(w.week_index,s.day,e.name)]).length,0);
  const pct=totalEx?Math.round(doneEx/totalEx*100):0;

  let h='<div class="back-row"><button class="back-btn" onclick="S.week=null;render()">‹</button><span class="back-label" style="color:'+c+'">'+esc(w.phase_name)+(lbl?' <span style="color:var(--muted)">· '+esc(lbl)+'</span>':'')+'</span></div>';
  h+='<div class="wk-nav">';
  h+='<button class="wk-nav-btn"'+(prevW?' onclick="goWeek('+prevW.week_index+')"':' disabled')+'><span class="arr">‹</span> W'+(prevW?prevW.week_index:'')+'</button>';
  h+='<div class="wk-nav-mid">'+w.week_index+' / '+p.total_weeks+'</div>';
  h+='<button class="wk-nav-btn"'+(nextW?' onclick="goWeek('+nextW.week_index+')"':' disabled')+'>W'+(nextW?nextW.week_index:'')+' <span class="arr">›</span></button>';
  h+='</div>';
  h+='<div class="wk-hdr"><span class="wk-hdr-big" style="color:'+c+'">'+String(w.week_index).padStart(2,'0')+'</span><div><div class="wk-hdr-sub">Week '+w.week_index+'</div><div class="prog-bar"><div class="prog-track"><div class="prog-fill" style="width:'+pct+'%;background:'+(pct===100?'#4ade80':'var(--lime)')+'"></div></div><span class="prog-text" style="color:'+(pct===100?'var(--green)':'var(--muted)')+'">'+doneEx+'/'+totalEx+'</span></div></div></div>';

  h+='<div class="daytabs">';
  for(const d of days){h+='<button class="dtab'+(d.day===s.day?' on':'')+'" onclick="S.day=''+d.day+'';renderWeek()">'+d.day.slice(0,3)+(d.optional?'<span style="font-size:8px;opacity:.4;margin-left:2px">*</span>':'')+'</button>'}
  h+='</div>';

  for(const b of s.blocks){
    const bDone=b.exercises.filter(e=>done[exKey(w.week_index,s.day,e.name)]).length;
    h+='<div class="blk open"><div class="blk-hdr" onclick="this.parentElement.classList.toggle('open')"><div class="blk-icon">'+BI(b.name)+'</div><div><div class="blk-title">'+esc(b.name)+'</div><div class="blk-count">'+b.exercises.length+' exercises'+(bDone?' <span>· '+bDone+' done</span>':'')+'</div></div><span class="blk-chev">›</span></div>';
    if(b.note)h+='<div class="blk-note">'+esc(b.note)+'</div>';
    h+='<div class="blk-body">';
    for(const e of b.exercises){
      const k=exKey(w.week_index,s.day,e.name);
      const isDone=!!done[k];
      h+='<div class="ex'+(isDone?' done':'')+'"><div class="ex-row"><div class="ex-chk'+(isDone?' on':'')+'" onclick="toggleEx(''+esc(k)+'')"></div><div class="ex-body"><div class="ex-name">'+esc(e.name)+'</div><div class="ex-chips">';
      if(e.rpe_value!=null)h+='<span class="ex-chip chip-rpe">RPE '+e.rpe_value+'</span>';

      h+='<span class="ex-chip chip-sets">'+e.sets.length+(e.sets.length===1?' set':' sets')+'</span></div>';
      if(e.sets&&e.sets.length){const cols='repeat('+e.sets.length+',1fr)';h+='<div class="sets-grid"><div class="sets-hdr" style="grid-template-columns:'+cols+'">'+e.sets.map((_,i)=>'<div class="sets-cell">S'+(i+1)+'</div>').join('')+'</div><div class="sets-vals" style="grid-template-columns:'+cols+'">'+e.sets.map(x=>'<div class="sets-cell">'+esc(x.reps||'—')+'</div>').join('')+'</div></div>'}
      if(e.notes)h+='<div class="ex-note">'+esc(e.notes)+'</div>';
      h+='</div></div></div>';
    }
    h+='</div></div>';
  }
  app.innerHTML=h;window.scrollTo(0,0);
}

function toggleEx(k){done[k]=!done[k];saveDone(done);render()}
function esc(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

render();
</script>
<script>
if('serviceWorker'in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})})}
</script>
</body>
</html>
